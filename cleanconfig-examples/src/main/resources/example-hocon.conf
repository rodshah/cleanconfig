# Application Configuration (HOCON format)
# Demonstrates key HOCON features: nesting, substitutions, durations, arrays

server {
  host = "localhost"
  port = 8080
  base-url = "http://"${server.host}":"${server.port}
}

database {
  url = "jdbc:postgresql://"${server.host}":5432/myapp"
  pool {
    min-connections = 5
    max-connections = 20
    idle-timeout = 30s
    connection-timeout = 5s
  }
  credentials {
    username = "app_user"
    password = "changeme"
  }
}

app {
  name = "HOCON Example App"
  version = "1.0.0"
  debug = false
  features = ["auth", "logging", "metrics", "rate-limiting"]
  allowed-origins = ["https://example.com", "https://api.example.com"]
}

kafka {
  brokers = "broker1:9092,broker2:9092,broker3:9092"
  topics {
    events = "spark-events"
    finish = "spark-finish"
    data-ready = "data-ready"
  }
  consumer {
    group-id = "archival-consumer"
    poll-timeout-ms = 1000
    max-poll-records = 500
  }
}

archiver {
  s3 {
    bucket = "my-archival-bucket"
    key-prefix = "spark/events"
    multipart-upload-part-size-bytes = 67108864
  }
  max-file-size-bytes = 5368709120
}
